<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batu | Haftalık Program</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@6.1.10/index.global.min.js'></script>
    
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            font-family: 'Montserrat', sans-serif;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        #calendar-container {
            max-width: 1200px; /* Genişlik ayarı */
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        /* FullCalendar içindeki saat dilimi renk ayarları */
        .fc-v-event {
            background-color: #3498db; /* Etkinliklerin varsayılan rengi */
            border: none;
            border-radius: 4px;
            padding: 2px 4px;
        }
    </style>
    
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');

        var calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'timeGridWeek', // Haftalık saatli görünüm
          slotMinTime: '07:00:00', // Sadece 07:00'den başla
          slotMaxTime: '22:00:00', // 22:00'de bitir
          allDaySlot: false, // "Tüm gün" satırını gizle
          firstDay: 1, // Hafta Pazartesi başlasın
          locale: 'tr', // Dil Türkçe
          height: 'auto', // Scroll çıkmasını engeller
          headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'timeGridWeek,timeGridDay'
          },
          buttonText: {
            today: 'Bugün',
            week: 'Hafta',
            day: 'Gün'
          },
          // GOOGLE CALENDAR BAĞLANTISI
          googleCalendarApiKey: 'AIzaSyDa96JKPXKrHmrK-VQXYm0JWT1Ox-M4-dM', 
          events: 'c6e2ed1ea9b29e5331cae3788525b02345227e0429209a275757a252bde402db@group.calendar.google.com '
        });

        calendar.render();
      });
    </script>
</head>
<body>

    <h1>Batu'nun Haftalık Programı</h1>

    <div id="calendar-container">
        <div id="calendar"></div>
    </div>

</body>
</html>
