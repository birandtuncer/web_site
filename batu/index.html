<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batu | Haftalık Program</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 40px;
            text-align: center;
        }
        .calendar-container {
            width: 100%;
            max-width: 900px;
            margin-top: 30px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background: white;
        }
        /* Takvimin telefonda ve bilgisayarda düzgün görünmesi için */
        .calendar-container iframe {
            width: 100%;
            height: 600px;
            border: 0;
        }
        @media screen and (max-width: 600px) {
            .calendar-container iframe {
                height: 500px;
            }
        }
    </style>
</head>
<body>

    <h1>Batu'nun Haftalık Programı</h1>

    <div class="calendar-container">
        <iframe src="https://calendar.google.com/calendar/embed?src=c6e2ed1ea9b29e5331cae3788525b02345227e0429209a275757a252bde402db%40group.calendar.google.com&ctz=Europe%2FIstanbul" style="border: 0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
        </div>

</body>
</html>
